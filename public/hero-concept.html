<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero — AI Portfolio Concept v2</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ═══════════════════════════════════════════════════
       TOKENS — DARK MODE (default)
       ═══════════════════════════════════════════════════ */
    :root {
      /* Canvas: line color channels + max alpha, leídos por JS */
      --line-r: 255;  --line-g: 255;  --line-b: 255;
      --line-alpha: 0.35;

      /* Page */
      --page-bg:  #080810;
      --bg-glow:  rgba(99, 102, 241, 0.09);

      /* Text */
      --text-1:  rgba(255, 255, 255, 0.93);
      --text-2:  rgba(255, 255, 255, 0.42);

      /* Badge */
      --badge-bg:     rgba( 99, 102, 241, 0.07);
      --badge-border: rgba( 99, 102, 241, 0.28);
      --badge-text:   rgba(165, 168, 255, 0.82);
      --badge-dot:    #6366f1;

      /* Heading accent gradient */
      --acc-from: #818cf8;
      --acc-mid:  #a78bfa;
      --acc-to:   #c4b5fd;

      /* Primary CTA */
      --btn1-from: #5457e8;
      --btn1-to:   #7c3aed;
      --btn1-glow: rgba(99, 102, 241, 0.38);
      --btn1-glow-h: rgba(99, 102, 241, 0.60);

      /* Secondary CTA */
      --btn2-bg:     rgba(255, 255, 255, 0.04);
      --btn2-text:   rgba(255, 255, 255, 0.70);
      --btn2-border: rgba(255, 255, 255, 0.09);
      --btn2-bg-h:   rgba(255, 255, 255, 0.08);
      --btn2-text-h: rgba(255, 255, 255, 0.92);
      --btn2-brd-h:  rgba(255, 255, 255, 0.17);

      /* Scroll */
      --scroll-text:  rgba(255, 255, 255, 0.18);
      --scroll-line:  rgba( 99, 102, 241, 0.55);

      /* Corner */
      --corner-c: rgba(255, 255, 255, 0.10);
    }

    /* ═══════════════════════════════════════════════════
       TOKENS — LIGHT MODE
       ═══════════════════════════════════════════════════ */
    @media (prefers-color-scheme: light) {
      :root {
        /* Canvas: líneas negras */
        --line-r: 0;  --line-g: 0;  --line-b: 0;
        --line-alpha: 0.30;

        --page-bg:  #f7f2ed;
        --bg-glow:  rgba(204, 85, 66, 0.07);

        --text-1:  rgba(20, 10,  5, 0.88);
        --text-2:  rgba(20, 10,  5, 0.44);

        --badge-bg:     rgba(204,  85,  66, 0.08);
        --badge-border: rgba(204,  85,  66, 0.30);
        --badge-text:   rgba(150,  48,  30, 0.85);
        --badge-dot:    #cc5542;

        --acc-from: #cc5542;
        --acc-mid:  #d4614f;
        --acc-to:   #e07b6a;

        --btn1-from:   #c44538;
        --btn1-to:     #9d3020;
        --btn1-glow:   rgba(204, 85, 66, 0.35);
        --btn1-glow-h: rgba(204, 85, 66, 0.58);

        --btn2-bg:     rgba(255, 255, 255, 0.55);
        --btn2-text:   rgba( 20,  10,   5, 0.65);
        --btn2-border: rgba( 20,  10,   5, 0.12);
        --btn2-bg-h:   rgba(255, 255, 255, 0.78);
        --btn2-text-h: rgba( 20,  10,   5, 0.88);
        --btn2-brd-h:  rgba( 20,  10,   5, 0.22);

        --scroll-text:  rgba( 20,  10,   5, 0.25);
        --scroll-line:  rgba(204,  85,  66, 0.50);

        --corner-c: rgba(20, 10, 5, 0.14);
      }
    }

    /* ── BASE ─────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse 75% 55% at 50% 56%, var(--bg-glow) 0%, transparent 68%),
        var(--page-bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s ease, color 0.3s ease;
    }

    /* ── CANVAS ───────────────────────────────────────── */
    #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── HERO ─────────────────────────────────────────── */
    .hero {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 0 28px;
    }

    /* ── ANIMATIONS ───────────────────────────────────── */
    @keyframes floatIn {
      from { opacity:0; transform: scale(0.86) translateY(20px); filter: blur(12px); }
      to   { opacity:1; transform: scale(1)    translateY(0);    filter: blur(0);    }
    }
    @keyframes pulseDot {
      0%,100% { opacity:1;   transform:scale(1);    }
      50%     { opacity:0.45; transform:scale(0.68); }
    }
    @keyframes bob {
      0%,100% { transform:translateY(0);   }
      50%     { transform:translateY(-7px); }
    }

    .anim {
      opacity: 0;
      animation: floatIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── BADGE ────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px 6px 11px; border-radius: 9999px;
      border: 1px solid var(--badge-border); background: var(--badge-bg);
      font-size: 0.7rem; font-weight: 400; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--badge-text);
      margin-bottom: 30px; animation-delay: 0s;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--badge-dot);
      animation: pulseDot 2s ease-in-out infinite;
    }

    /* ── HEADING ──────────────────────────────────────── */
    .heading {
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 200; letter-spacing: -0.025em; line-height: 1.08;
      color: var(--text-1); margin-bottom: 22px; max-width: 860px;
      animation-delay: 0.18s;
    }
    .heading .accent {
      display: inline-block; font-weight: 300;
      background: linear-gradient(120deg, var(--acc-from) 0%, var(--acc-mid) 50%, var(--acc-to) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── SUBTITLE ─────────────────────────────────────── */
    .subtitle {
      font-size: clamp(0.92rem, 1.8vw, 1.12rem); font-weight: 300;
      color: var(--text-2); max-width: 500px; line-height: 1.75;
      margin-bottom: 44px; animation-delay: 0.42s;
    }

    /* ── CTAs ─────────────────────────────────────────── */
    .cta-group {
      display: flex; gap: 12px; align-items: center;
      flex-wrap: wrap; justify-content: center; animation-delay: 0.66s;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 400; letter-spacing: 0.02em;
      cursor: pointer; text-decoration: none; border: none; outline: none;
      transition:
        transform 0.26s cubic-bezier(0.34,1.56,0.64,1),
        box-shadow 0.26s ease, background 0.2s ease,
        border-color 0.2s ease, color 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--btn1-from), var(--btn1-to));
      color: #fff;
      box-shadow: 0 0 28px var(--btn1-glow), 0 4px 18px var(--btn1-glow);
    }
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 48px var(--btn1-glow-h), 0 8px 28px var(--btn1-glow-h);
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: var(--btn2-bg); color: var(--btn2-text);
      border: 1px solid var(--btn2-border);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    }
    .btn-secondary:hover {
      transform: translateY(-3px) scale(1.02);
      background: var(--btn2-bg-h); border-color: var(--btn2-brd-h); color: var(--btn2-text-h);
    }
    .btn-secondary:active { transform: scale(0.97); }

    /* ── SCROLL HINT ──────────────────────────────────── */
    .scroll-hint {
      position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      opacity: 0; animation: floatIn 1s cubic-bezier(0.22,1,0.36,1) 1.3s forwards;
    }
    .scroll-hint span { font-size:0.62rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--scroll-text); }
    .scroll-line { width:1px; height:36px; background:linear-gradient(to bottom,var(--scroll-line),transparent); animation:bob 2.2s ease-in-out infinite; }

    /* ── CORNER ───────────────────────────────────────── */
    .corner-label { position:fixed; bottom:20px; right:22px; z-index:20; font-size:0.62rem; color:var(--corner-c); letter-spacing:0.08em; text-transform:uppercase; pointer-events:none; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <section class="hero">

    <div class="badge anim">
      <span class="badge-dot"></span>
      AI-Driven Portfolio
    </div>

    <h1 class="heading anim">
      Orquestando el Futuro<br>
      <span class="accent">con Inteligencia Artificial</span>
    </h1>

    <p class="subtitle anim">
      Desarrollador especializado en construir soluciones de IA aplicadas.<br>
      Donde la tecnología de vanguardia se convierte en producto real.
    </p>

    <div class="cta-group anim">
      <a href="#" class="btn btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Ver proyectos
      </a>
      <a href="#" class="btn btn-secondary">
        Sobre mí
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>

    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>

  </section>

  <div class="corner-label">Hero Concept v2 · Vanilla JS</div>

  <script>
  (() => {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    /* ── Mouse ─────────────────────────────────────── */
    const mouse = { x: -9999, y: -9999 };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

    /* ── Config ─────────────────────────────────────── */
    const N        = 15;
    const MAX_DIST = 230;
    const MOUSE_R  = 140;
    const PUSH     = 30;

    /* Node color palettes — [R, G, B] */
    const DARK_PALETTE = [
      [ 99, 102, 241],   // indigo
      [139,  92, 246],   // violet
      [196, 181, 253],   // lavender
      [165, 180, 252],   // periwinkle
      [224, 231, 255],   // almost-white
    ];

    const LIGHT_PALETTE = [
      [204,  85,  66],   // terracota core
      [212,  97,  79],   // terracota cálido
      [184,  64,  53],   // terracota oscuro
      [228, 123, 106],   // salmón suave
      [157,  58,  42],   // terracota profundo
    ];

    /* ── Scheme detection ───────────────────────────── */
    const lightMQ = window.matchMedia('(prefers-color-scheme: light)');
    const isLight = () => lightMQ.matches;

    /* Read line color channels from CSS vars */
    function readLineRGB() {
      const s = getComputedStyle(document.documentElement);
      return {
        r:     +s.getPropertyValue('--line-r').trim()     || 0,
        g:     +s.getPropertyValue('--line-g').trim()     || 0,
        b:     +s.getPropertyValue('--line-b').trim()     || 0,
        alpha: +s.getPropertyValue('--line-alpha').trim() || 0.35,
      };
    }

    let lineRGB = readLineRGB();

    /* ── Canvas state ───────────────────────────────── */
    let nodes = [];
    let W = 0, H = 0;
    let rafId = 0;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function spawnNodes() {
      const pad     = 80;
      const palette = isLight() ? LIGHT_PALETTE : DARK_PALETTE;
      nodes = Array.from({ length: N }, () => {
        const bx = pad + Math.random() * (W - pad * 2);
        const by = pad + Math.random() * (H - pad * 2);
        return {
          baseX: bx, baseY: by, x: bx, y: by,
          vx:  2.2e-4 + Math.random() * 5e-4,
          vy:  1.8e-4 + Math.random() * 4.5e-4,
          phX: Math.random() * Math.PI * 2,
          phY: Math.random() * Math.PI * 2,
          dX:  16 + Math.random() * 30,
          dY:  12 + Math.random() * 22,
          r:   1.6 + Math.random() * 2.4,
          col: palette[Math.floor(Math.random() * palette.length)],
        };
      });
    }

    /* ── Update ─────────────────────────────────────── */
    function update(t) {
      for (const n of nodes) {
        n.x = n.baseX + Math.sin(t * n.vx + n.phX) * n.dX;
        n.y = n.baseY + Math.cos(t * n.vy + n.phY) * n.dY;
        const mdx  = n.x - mouse.x;
        const mdy  = n.y - mouse.y;
        const dist = Math.sqrt(mdx * mdx + mdy * mdy);
        if (dist < MOUSE_R && dist > 0.5) {
          const f = (MOUSE_R - dist) / MOUSE_R;
          n.x += (mdx / dist) * f * PUSH;
          n.y += (mdy / dist) * f * PUSH;
        }
      }
    }

    /* ── Draw ───────────────────────────────────────── */
    function draw() {
      ctx.clearRect(0, 0, W, H);

      const { r: lr, g: lg, b: lb, alpha: maxA } = lineRGB;
      ctx.lineWidth = 0.9;

      /* connections — solid white (dark) / black (light) */
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx   = nodes[j].x - nodes[i].x;
          const dy   = nodes[j].y - nodes[i].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist >= MAX_DIST) continue;

          const a = (1 - dist / MAX_DIST) * maxA;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${lr},${lg},${lb},${a})`;
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }

      /* nodes */
      for (const n of nodes) {
        const [r, g, b] = n.col;

        /* glow */
        ctx.shadowBlur  = 20;
        ctx.shadowColor = `rgba(${r},${g},${b},0.65)`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},0.92)`;
        ctx.fill();
        ctx.shadowBlur = 0;

        /* outer halo */
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},0.055)`;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    /* ── Loop ───────────────────────────────────────── */
    function loop(t) {
      update(t);
      draw();
      rafId = requestAnimationFrame(loop);
    }

    /* ── Init & resize ──────────────────────────────── */
    function init() {
      resize();
      spawnNodes();
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }

    let rTimer;
    window.addEventListener('resize', () => { clearTimeout(rTimer); rTimer = setTimeout(init, 120); });

    /* Refresh on scheme change */
    lightMQ.addEventListener('change', () => { lineRGB = readLineRGB(); spawnNodes(); });

    init();
  })();
  </script>
</body>
</html>
